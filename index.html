<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeForSuccess DSA Sheet</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/img/logo.png" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-mark">CFS</div>
        <nav>
          <a class="nav-item active">DSA Sheet</a>
        </nav>
      </aside>

      <main class="main-content">
        <header class="hero">
          <div>
            <span class="eyebrow">CodeForSuccess</span>
            <h1>DSA Master Sheet</h1>
            <p>
              Topic-wise structured sheet with progress tracking, revision
              stars, notes, and instant filtering.
            </p>
          </div>
          <div class="hero-actions">
            <button id="resetBtn" class="ghost-btn">Reset Filters</button>
            <button id="clearProgressBtn" class="ghost-btn danger">
              Clear Progress
            </button>
          </div>
        </header>

        <section class="stats-grid">
          <article class="stat-card primary">
            <div class="ring"><span id="overallPercent">0%</span></div>
            <div>
              <p class="label">Overall Progress</p>
              <h2>
                <span id="totalSolved">0</span> /
                <span id="totalQuestions">0</span>
              </h2>
              <div class="progress-bar"><span id="progressFill"></span></div>
            </div>
          </article>
          <article class="stat-card">
            <p class="label">Topics</p>
            <h3 id="topicCount">0</h3>
          </article>
          <article class="stat-card">
            <p class="label">Easy</p>
            <h3 id="easyCount">0</h3>
          </article>
          <article class="stat-card">
            <p class="label">Medium</p>
            <h3 id="mediumCount">0</h3>
          </article>
          <article class="stat-card">
            <p class="label">Hard</p>
            <h3 id="hardCount">0</h3>
          </article>
        </section>

        <section class="toolbar">
          <div class="search-box">
            <input
              id="searchInput"
              type="search"
              placeholder="Search by title, topic, pattern..."
            />
          </div>
          <select id="difficultyFilter">
            <option>All</option>
            <option>Easy</option>
            <option>Medium</option>
            <option>Hard</option>
          </select>
          <select id="topicFilter"></select>
          <select id="patternFilter"></select>
          <button id="importantToggle" class="filter-chip">
            Important only
          </button>
          <button id="revisionToggle" class="filter-chip">Revision only</button>
          <button id="solvedToggle" class="filter-chip">Solved only</button>
        </section>

        <section id="topicList" class="topic-list"></section>
      </main>
    </div>

    <dialog id="notesModal" class="notes-modal">
      <div class="modal-head">
        <h3 id="notesTitle">Notes</h3>
        <button id="notesClose" class="icon-btn">✕</button>
      </div>
      <textarea
        id="notesTextarea"
        placeholder="Add your notes, edge cases, dry run, revision tips..."
      ></textarea>
      <div class="modal-actions">
        <button id="notesDelete" class="ghost-btn danger">Delete</button>
        <button id="notesSave" class="solid-btn">Save Note</button>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
